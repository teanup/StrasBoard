<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrasBoard</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="dashboard" x-data="dashboard">

    <header class="dashboard-header">
      <h1 class="dashboard-title">StrasBoard</h1>
      <time class="dashboard-timestamp"
            x-text="timestamp ? new Date(timestamp).toLocaleString() : '--'"></time>
    </header>

    <div class="widgets">

      <!-- Weather -->
      <article class="widget" data-type="weather">
        <div class="widget-header">
          <h2><span>🌤️</span> <span data-i18n="weather"></span></h2>
          <template x-if="weather.warning">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="weather.error || weather.warning">
            <div class="widget-overlay" :data-level="weather.error ? 'error' : 'warning'">
              <span x-text="weather.error || weather.warning"></span>
            </div>
          </template>
          <template x-if="!weather.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="weather.data">
            <div>
              <div>
                <strong x-text="Math.round(weather.data.current?.temperature ?? 0) + '°C'"></strong>
                <span x-text="'(feels ' + Math.round(weather.data.current?.feels_like ?? 0) + '°C)'"></span>
                <span x-text="'— code ' + (weather.data.current?.code ?? '?')"></span>
                <span x-text="weather.data.current?.is_day ? '☀' : '🌙'"></span>
              </div>
              <div x-text="weather.data.hourly.length + ' hourly points, ' + weather.data.daily.length + ' daily forecasts'"></div>
            </div>
          </template>
        </div>
      </article>

      <!-- Temperature -->
      <article class="widget" data-type="temperature">
        <div class="widget-header">
          <h2><span>🌡️</span> <span data-i18n="temperature"></span></h2>
          <template x-if="temperature.warning">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="temperature.error || temperature.warning">
            <div class="widget-overlay" :data-level="temperature.error ? 'error' : 'warning'">
              <span x-text="temperature.error || temperature.warning"></span>
            </div>
          </template>
          <template x-if="!temperature.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="temperature.data">
            <div>
              <div><strong x-text="temperature.data.temperature + '°C'"></strong></div>
              <div x-text="temperature.data.humidity + '% humidity'"></div>
              <div x-show="temperature.data.location" x-text="temperature.data.location"></div>
            </div>
          </template>
        </div>
      </article>

      <!-- Transport -->
      <article class="widget" data-type="transport">
        <div class="widget-header">
          <h2><span>🚋</span> <span data-i18n="transport"></span></h2>
          <template x-if="transport.warning">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="transport.error || transport.warning">
            <div class="widget-overlay" :data-level="transport.error ? 'error' : 'warning'">
              <span x-text="transport.error || transport.warning"></span>
            </div>
          </template>
          <template x-if="!transport.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="transport.data">
            <div>
              <template x-for="stop in transport.data.stops" :key="stop.id + stop.destination">
                <div @click="refreshStop(stop.id)" style="cursor:pointer; margin-bottom:0.25rem">
                  <span class="badge line-badge"
                          :style="`background:${stop.color}; color:${stop.colorText}`"
                          x-text="stop.line"></span>
                  <span x-text="stop.stop"></span>
                  <span x-show="stop.destination" x-text="'→ ' + stop.destination" style="opacity:0.7"></span>
                  <span>
                    <template x-for="dep in stop.departures.slice(0, 3)" :key="dep.time">
                      <span x-text="formatDeparture(dep.time)"
                            :style="dep.realtime ? '' : 'text-decoration:underline'"
                            style="margin-left:0.5em; font-weight:600"></span>
                    </template>
                    <template x-if="!stop.departures.length">
                      <em data-i18n="no-departures"></em>
                    </template>
                  </span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </article>

      <!-- Electricity -->
      <article class="widget" data-type="electricity">
        <div class="widget-header">
          <h2><span>⚡</span> <span data-i18n="electricity"></span></h2>
          <template x-if="electricity.warning">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="electricity.error || electricity.warning">
            <div class="widget-overlay" :data-level="electricity.error ? 'error' : 'warning'">
              <span x-text="electricity.error || electricity.warning"></span>
            </div>
          </template>
          <template x-if="!electricity.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="electricity.data">
            <div>
              <div><strong>Monthly</strong></div>
              <template x-for="m in electricity.data.months" :key="m.date">
                <div x-text="m.date + ': BU=' + (m.buhc+m.buhp) + ' BC=' + (m.bchc+m.bchp) + ' R=' + (m.rhc+m.rhp) + ' kWh'"></div>
              </template>
              <div style="margin-top:0.5em"><strong>Daily (last 14)</strong></div>
              <template x-for="d in electricity.data.days" :key="d.date">
                <div x-text="d.date + ': ' + (d.buhc+d.buhp+d.bchc+d.bchp+d.rhc+d.rhp) + ' kWh'"></div>
              </template>
            </div>
          </template>
        </div>
      </article>

      <!-- Tempo -->
      <article class="widget" data-type="tempo">
        <div class="widget-header">
          <h2><span>📅</span> <span data-i18n="tempo"></span></h2>
          <template x-if="tempo.warning">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="tempo.error || tempo.warning">
            <div class="widget-overlay" :data-level="tempo.error ? 'error' : 'warning'">
              <span x-text="tempo.error || tempo.warning"></span>
            </div>
          </template>
          <template x-if="!tempo.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="tempo.data">
            <div>
              <div x-text="'Today: ' + (tempo.data.today ?? '?')"></div>
              <div x-text="'Tomorrow: ' + (tempo.data.tomorrow ?? '?')"></div>
            </div>
          </template>
        </div>
      </article>

    </div>
  </div>

  <script defer src="/static/js/alpine.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
