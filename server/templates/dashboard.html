<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrasBoard</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="dashboard" x-data="dashboard">

    <header class="dashboard-header">
      <h1 class="dashboard-title">StrasBoard</h1>
      <time class="dashboard-timestamp"
            x-text="timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()"></time>
    </header>

    <div class="widgets">

      <!-- Weather -->
      <article class="widget" data-type="weather">
        <div class="widget-header">
          <h2><span>🌤️</span> <span data-i18n="weather"></span></h2>
          <template x-if="weather.error && weather.data">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="weather.error">
            <div class="widget-overlay" :data-level="weather.data ? 'warning' : 'error'">
              <span><span x-text="weather.error"></span></span>
            </div>
          </template>
          <template x-if="!weather.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="weather.data">
            <div>
              <div>
                <strong x-text="Math.round(weather.data.current?.temperature ?? 0) + '°C'"></strong>
                <span x-text="'(feels ' + Math.round(weather.data.current?.feels_like ?? 0) + '°C)'"></span>
                <span x-text="'- code ' + (weather.data.current?.code ?? '?')"></span>
                <span x-text="weather.data.current?.is_day ? '☀' : '🌙'"></span>
              </div>
              <div x-text="weather.data.hourly.length + ' hourly points, ' + weather.data.daily.length + ' daily forecasts'"></div>
            </div>
          </template>
        </div>
      </article>

      <!-- Temperature -->
      <article class="widget" data-type="temperature">
        <div class="widget-header">
          <h2><span>🌡️</span> <span data-i18n="temperature"></span></h2>
          <template x-if="temperature.error && temperature.data">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="temperature.error">
            <div class="widget-overlay" :data-level="temperature.data ? 'warning' : 'error'">
              <span><span x-text="temperature.error"></span></span>
            </div>
          </template>
          <template x-if="!temperature.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="temperature.data">
            <div class="indoor-widget">
              <div class="indoor-value">
                <span class="indoor-number" x-text="temperature.data.temperature"></span>
                <span class="indoor-unit">°C</span>
              </div>
              <div class="indoor-humidity">
                <span x-text="temperature.data.humidity + '%'"></span>
                <span data-i18n="humidity"></span>
              </div>
              <div class="indoor-location" x-show="temperature.data.location"
                   x-text="temperature.data.location"></div>
            </div>
          </template>
        </div>
      </article>

      <!-- Transport -->
      <article class="widget" data-type="transport">
        <div class="widget-header">
          <h2><span>🚋</span> <span data-i18n="transport"></span></h2>
          <template x-if="transport.error && transport.data">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="transport.error">
            <div class="widget-overlay" :data-level="transport.data ? 'warning' : 'error'">
              <span><span x-text="transport.error"></span></span>
            </div>
          </template>
          <template x-if="!transport.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="transport.data">
            <div>
              <template x-for="stop in transport.data.stops" :key="stop.id + '-' + stop.destination">
                <div class="transport-row" @click="refreshStop(stop.id)"
                     :data-stop-id="stop.id">
                  <div class="transport-info">
                    <span class="badge line-badge"
                          :style="`background:${stop.color}; color:${stop.colorText}`"
                          x-text="stop.line"></span>
                    <span x-text="stop.stop"></span>
                    <span class="transport-dest" x-show="stop.destination"
                          x-text="stop.destination"></span>
                  </div>
                  <div class="transport-times">
                    <template x-for="dep in getActiveDepartures(stop.departures, now)" :key="dep.time">
                      <span class="transport-time" :class="!dep.realtime && 'scheduled'"
                            x-text="formatDeparture(dep.time, now)"></span>
                    </template>
                    <template x-if="!getActiveDepartures(stop.departures, now).length">
                      <em data-i18n="no-departures"></em>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </article>

      <!-- Electricity -->
      <article class="widget" data-type="electricity">
        <div class="widget-header">
          <h2><span>⚡</span> <span data-i18n="electricity"></span></h2>
          <template x-if="electricity.error && electricity.data">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="electricity.error">
            <div class="widget-overlay" :data-level="electricity.data ? 'warning' : 'error'">
              <span><span x-text="electricity.error"></span></span>
            </div>
          </template>
          <template x-if="!electricity.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="electricity.data">
            <div>
              <div style="margin-top: var(--space-xs); margin-bottom: var(--space-md)">
                <div class="bar-group bar-h">
                  <template x-for="(bar, bi) in electricity.data.monthBars" :key="bi">
                    <div class="bar-item">
                      <span class="bar-title" x-text="bar.title"></span>
                      <div class="bar" :class="bi < electricity.data.monthBars.length - 1 && 'bar-dim'">
                        <template x-for="(seg, si) in barSegments(bar.segments)" :key="si">
                          <div class="bar-seg" :data-tariff="seg.tariff" :title="seg.value + ' kWh'" :style="segStyle(seg, electricity.data.monthMax)"></div>
                        </template>
                        <span class="bar-label" :data-value="barTotal(bar)"></span>
                        <template x-if="bar.ext">
                          <div class="bar-ext" :style="extStyle(bar, electricity.data.monthMax)"></div>
                        </template>
                        <template x-if="showExtLabel(bar, electricity.data.monthMax)">
                          <span class="bar-label" :data-value="barTotal(bar) + bar.ext"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
              <div class="bar-group bar-v" style="height: 12rem; margin-bottom: var(--space-md)">
                <template x-for="(group, gi) in electricity.data.dayGroups" :key="gi">
                  <div class="bar-item">
                    <template x-for="(bar, bi) in group.bars" :key="bi">
                      <div class="bar" :class="bar.dim && 'bar-dim'">
                        <template x-for="(seg, si) in barSegments(bar.segments)" :key="si">
                          <div class="bar-seg" :data-tariff="seg.tariff" :title="seg.value + ' kWh'" :style="segStyle(seg, electricity.data.dayMax)"></div>
                        </template>
                        <span class="bar-label" :data-value="barTotal(bar)"></span>
                      </div>
                    </template>
                    <span class="bar-title" x-text="group.title"></span>
                  </div>
                </template>
              </div>
              <div class="bar-legend">
                <template x-for="key in electricity.data.legend" :key="key">
                  <span class="bar-legend-item">
                    <span class="bar-legend-swatch" :data-tariff="key"></span>
                    <span class="bar-legend-label" :data-tariff="key"></span>
                  </span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </article>

      <!-- Tempo -->
      <article class="widget" data-type="tempo">
        <div class="widget-header">
          <h2><span>📅</span> <span data-i18n="tempo"></span></h2>
          <template x-if="tempo.error && tempo.data">
            <span class="badge widget-badge">!</span>
          </template>
        </div>
        <div class="widget-content">
          <template x-if="tempo.error">
            <div class="widget-overlay" :data-level="tempo.data ? 'warning' : 'error'">
              <span><span x-text="tempo.error"></span></span>
            </div>
          </template>
          <template x-if="!tempo.data">
            <div class="widget-loading"><span data-i18n="loading"></span></div>
          </template>
          <template x-if="tempo.data">
            <div class="tempo-days">
              <div class="tempo-day">
                <span class="tempo-label" data-i18n="today"></span>
                <span class="badge tempo-badge" :data-color="tempo.data.today ?? 'unknown'"></span>
              </div>
              <div class="tempo-day">
                <span class="tempo-label" data-i18n="tomorrow"></span>
                <span class="badge tempo-badge" :data-color="tempo.data.tomorrow ?? 'unknown'"></span>
              </div>
            </div>
          </template>
        </div>
      </article>

    </div>
  </div>

  <script defer src="/static/js/alpine.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
