services:
  strasboard:
    container_name: web-strasboard
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      PORT: ${STRASBOARD_PORT:-80}
    build: ./server
    env_file:
      - ./server/.env
    ports:
      - "8080:${STRASBOARD_PORT:-80}"

  sensor:
    container_name: web-sensor
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      PORT: ${SENSOR_PORT:-80}
    networks:
      - sensor-network
    build: ./sensor
    env_file:
      - ./sensor/.env
    ports:
      - "8080:${SENSOR_PORT:-80}"
    volumes:
      - /sys/class/gpio:/sys/class/gpio
    devices:
      - /dev/gpiochip0:/dev/gpiochip0

networks:
  sensor-network:
    name: sensor
    external: true
